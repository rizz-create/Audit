<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Directors & Shareholders</title>

<style>
.export-bar{
    margin-top:30pt;
    text-align:center;
}

.export-bar button{
    padding:6px 14px;
    font-size:10pt;
    cursor:pointer;
}

@media print{
    .export-bar{ display:none; }
}

body{
    font-family: "Trebuchet MS", serif;
    font-size: 10pt;
    line-height: 1.5;
    margin: 2.54cm;
    color:#000;
}

/* Headings */
h1{
    text-align:center;
    font-size:12pt;
    text-decoration:underline;
    margin-bottom:18pt;
}
h2{
    font-size:10.5pt;
    margin-top:18pt;
    margin-bottom:6pt;
}

/* Tables */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:6pt;
}
th, td{
    border:1px solid #000;
    padding:6px;
    vertical-align:top;
}

/* Control panel */
.controls{
    border:1px solid #999;
    padding:12px;
    margin-bottom:24px;
    background:#f5f5f5;
}
@media print{
    .controls{ display:none; }
}

/* Signature block */
.signature{
    margin-top:24pt;
}
.signature div{
    margin-top:24pt;
}
</style>
</head>

<body>

<!-- ================= CONTROLS ================= -->
<div class="controls">
    <label><strong>Upload JSON File:</strong></label><br>
    <input type="file" accept=".json" onchange="loadJSON(this)">
</div>


<!-- ================= DIRECTORS ================= -->
<div class="Section1">
<h1>LIST OF DIRECTORS AS ON 31/03/2025</h1>
<table id="directorsTable">
    <thead>
        <tr>
            <th>Sl. No</th>
            <th>Name of Director</th>
            <th>DIN</th>
            <th>Designation</th>
            <th>Date of Appointment</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- ================= SHAREHOLDERS ================= -->
<h1>LIST OF SHAREHOLDERS AS ON 31/03/2025</h1><table id="shareholdersTable">
    <thead>
        <tr>
            <th>Sl. No</th>
            <th>Name of Shareholder</th>
            <th>No. of Shares</th>
            <th>Percentage</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
</div>


<script>
/* ================= LOAD JSON ================= */
function loadJSON(input){
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        try {
            const json = JSON.parse(e.target.result);
            fillDirectors(json);
            fillShareholders(json);
            
        } catch (err) {
            console.error(err);
            alert("Invalid JSON or structure mismatch");
        }
    };
    reader.readAsText(file);
}

/* ================= DIRECTORS ================= */
function fillDirectors(json){
    const directors =
        json.ITR?.ITR6?.PartA_GEN2For6?.KeyPersons || [];

    const tbody = document.querySelector("#directorsTable tbody");
    tbody.innerHTML = "";

    directors.forEach((d, i) => {

        // Designation mapping
        const DESIGNATION_MAP = {
            "DIR": "DIRECTOR",
            "MD": "MANAGING DIRECTOR",
            "WTD": "WHOLE-TIME DIRECTOR"
        };

        const designation =
            DESIGNATION_MAP[d.Designation] || d.Designation || "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${d.PersonName || ""}</td>
            <td>${d.DirectorIdNo || ""}</td>
            <td>${designation}</td>
            <td></td>
        `;
        tbody.appendChild(tr);
    });
}

/* ================= SHAREHOLDERS ================= */
function fillShareholders(json){
    const shareholders =
        json.ITR?.ITR6?.ScheduleSH?.ShrhldngUnlistedCompany?.DtlsSHEndPreviousYearUC || [];

    const tbody = document.querySelector("#shareholdersTable tbody");
    tbody.innerHTML = "";

    // Calculate total shares
    const totalShares = shareholders.reduce(
        (sum, s) => sum + (s.NumberOfSharesHeld || 0), 0
    );

    shareholders.forEach((s, i) => {
        const percentage = totalShares
            ? ((s.NumberOfSharesHeld / totalShares) * 100).toFixed(2) + "%"
            : "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${s.ShareholderName || ""}</td>
            <td>${s.NumberOfSharesHeld || ""}</td>
            <td>${percentage}</td>
        `;
        tbody.appendChild(tr);
    });
}

function exportToWord(){

    /* ✅ EXPORT ONLY THE SECTION CONTENT */
    const content = document.querySelector(".Section1").outerHTML;

    const html = `
<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">

<head>
<meta charset="UTF-8">

<!--[if gte mso 9]>
<xml>
<w:WordDocument>
<w:View>Print</w:View>
<w:Zoom>100</w:Zoom>
<w:DoNotOptimizeForBrowser/>
</w:WordDocument>
</xml>
<![endif]-->

<style>

/* ===== HARD WORD PAGE SETUP ===== */
@page Section1 {
    size: 21cm 29.7cm;
    margin: 2.54cm;
}

div.Section1 {
    page: Section1;
}

/* ===== RESET BODY ===== */
body {
    margin: 0;
    padding: 0;
    font-family: "Times New Roman", serif;
    font-size: 10pt;
}

/* ===== HEADINGS ===== */
h1 {
    text-align: center;
    font-size: 12pt;
    font-weight: bold;
    text-decoration: underline;
    margin-bottom: 18pt;
}

/* ===== TABLES (WORD SAFE) ===== */
table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    mso-table-lspace: 0pt;
    mso-table-rspace: 0pt;
}

th, td {
    border: 1pt solid #000;
    padding: 6pt;
    vertical-align: top;
    font-size: 10pt;
}

th {
    font-weight: bold;
    text-align: center;
}

</style>
</head>

<body>
${content}
</body>
</html>`;

    const blob = new Blob(['\ufeff', html], {
        type: 'application/msword'
    });

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");

    a.href = url;
    a.download = "Directors_and_Shareholders.doc";
    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>


<div class="export-bar">
    <button onclick="exportToWord()">Export to Word</button>
</div>

</body>
</html>
